server {
    listen 80;
    server_name api.hdreams.com localhost;
    root /var/www/hdreams-backend/public;
    index index.php;

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Webhooks Meta — sin buffer para respuesta rápida
    location ~ ^/webhook- {
        fastcgi_read_timeout 30s;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # API y resto
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60s;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.(env|git|htaccess) {
        deny all;
    }

    location ~* \.(log|sql|sh)$ {
        deny all;
    }

    # Uploads
    location /uploads/ {
        alias /var/www/hdreams-backend/storage/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/hdreams-access.log;
    error_log  /var/log/nginx/hdreams-error.log;
}
